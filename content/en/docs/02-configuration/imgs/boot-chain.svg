  <text x="111" y="140" text-anchor="middle" font-size="20" font-family="Georgia, serif" fill="#14213d">reset</text>
  <rect x="236" y="62" width="176" height="116" rx="16" fill="#fdecc8" stroke="#9c6644" stroke-width="3"/>
